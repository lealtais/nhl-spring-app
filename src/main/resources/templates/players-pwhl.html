<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jogadores da PWHL</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script defer th:src="@{/js/app.js}"></script>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav('pwhl')}"></div>

    <main class="container">
      <header class="page-head">
        <h1>Jogadores da PWHL</h1>
        <p class="muted">
          Exemplo de página (rota: <code>/jogadores/pwhl</code>). Se você tiver
          uma lista real vinda do backend, a gente troca estes cards por um
          <code th:text="\${...}"></code> depois.
        </p>
      </header>

      <section class="grid grid--tight">
        <article class="player">
          <div class="player__avatar">22</div>
          <div class="player__info">
            <div class="player__name">Marie-Philip Poulin</div>
            <div class="player__meta">F • Montréal</div>
          </div>
        </article>
        <article class="player">
          <div class="player__avatar">29</div>
          <div class="player__info">
            <div class="player__name">Hilary Knight</div>
            <div class="player__meta">F • Boston</div>
          </div>
        </article>
        <article class="player">
          <div class="player__avatar">16</div>
          <div class="player__info">
            <div class="player__name">Sarah Nurse</div>
            <div class="player__meta">F • Toronto</div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
