<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <body>
    <header class="site-header" th:fragment="nav(active)">
      <a class="brand" th:href="@{/}" aria-label="Página inicial">
        <span class="brand__mark">NHL</span>
        <span class="brand__name">Spring App</span>
      </a>

      <button
        class="nav-toggle"
        type="button"
        aria-controls="primary-nav"
        aria-expanded="false"
        data-nav-toggle
      >
        <span class="nav-toggle__icon" aria-hidden="true"></span>
        <span class="sr-only">Abrir menu</span>
      </button>

      <nav id="primary-nav" class="nav" aria-label="Menu principal" data-nav>
        <a
          class="nav__link"
          th:href="@{/jogadores/nhl}"
          th:attr="data-active=${active == 'nhl'}"
        >
          Jogadores da NHL
        </a>
        <a
          class="nav__link"
          th:href="@{/leafs-nation-shop/leafs}"
          th:attr="data-active=${active == 'shop'}"
        >
          Leafs Nation SHOP
        </a>
        <a
          class="nav__link"
          th:href="@{/cart}"
          th:attr="data-active=${active == 'cart'}"
        >
          🛒 Carrinho
        </a>
        <a
          class="nav__link"
          th:href="@{/estatisticas-de-jogos}"
          th:attr="data-active=${active == 'stats'}"
        >
          Estatísticas de jogos
        </a>
        <a
          class="nav__link nav__link--external"
          th:href="@{/site-oficial-nhl}"
          th:attr="data-active=${active == 'nhlOfficial'}"
          rel="noopener"
        >
          Site oficial da NHL
        </a>
        <a sec:authorize="isAnonymous()" class="nav__link" th:href="@{/login}" th:attr="data-active=${active == 'login'}">Entrar</a>
        <a sec:authorize="isAnonymous()" class="nav__link" th:href="@{/register}" th:attr="data-active=${active == 'register'}">Cadastrar</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline; margin:0; padding:0;">
          <button type="submit" class="nav__link" style="border:none; cursor:pointer; font:inherit;">Sair</button>
        </form>
      </nav>
    </header>
  </body>
</html>
