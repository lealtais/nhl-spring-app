<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Esqueci Minha Senha - Leafs Nation Shop</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
    <div th:replace="~{fragments/nav :: nav('login')}"></div>
    <main class="container">
      <header class="page-head">
        <h1>Recuperar Senha</h1>
        <p class="muted">Digite seu e-mail e enviaremos um link de recuperação.</p>
      </header>

      <div class="card" style="max-width: 400px; margin: 0 auto;">
          <div th:if="${successMsg}" style="color: green; margin-bottom: 12px; font-weight: bold;" th:text="${successMsg}"></div>
          
          <form th:action="@{/forgot-password}" method="post" style="display: flex; flex-direction: column; gap: 14px;">
              <label style="display: flex; flex-direction: column; gap: 4px;">
                  <span style="font-weight: 600;">E-mail</span>
                  <input type="email" name="email" required placeholder="Digite seu e-mail cadastrado" style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; color: #333;" />
              </label>
              <button type="submit" style="padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">
                  Enviar Link de Recuperação
              </button>
          </form>
          <div style="text-align: center; margin-top: 1.5rem;">
              <a th:href="@{/login}" style="color: var(--blue); text-decoration: none; font-size: 0.9rem; font-weight: bold;">Voltar para o Login</a>
          </div>
      </div>
    </main>
</body>
</html>
