<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jogadores da NHL</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script defer th:src="@{/js/app.js}"></script>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav('nhl')}"></div>

    <main class="container">
      <header class="page-head">
        <h1>Jogadores da NHL</h1>
        <p class="muted">
          Toque/clique em um card para virar e ver a descrição.
        </p>
      </header>

      <section class="cards-grid" aria-label="Cards de jogadores da NHL">
        <div
          class="flip-card"
          th:each="p : ${players}"
        >
          <div class="flip-card__inner">
            <!-- Front Face -->
            <div class="flip-card__face flip-card__front">
              <div class="player-card">
                <img
                  class="player-card__img"
                  th:src="${p.image}"
                  th:alt="${p.name}"
                />
                <div class="player-card__name" th:text="${p.name}"></div>
                <div class="player-card__team" th:text="${p.team}"></div>
                <div class="player-card__meta">
                  <span th:text="${'#' + p.number}"></span> • 
                  <span th:text="${p.position}"></span>
                </div>
              </div>
            </div>

            <!-- Back Face -->
            <div class="flip-card__face flip-card__back">
              <div class="player-card player-card--back">
                <div class="player-card__name" th:text="${p.name}"></div>
                
                <div class="player-card__stats">
                  <div class="stat-item">
                    <span class="stat-item__label">Posição</span>
                    <span class="stat-item__value" th:text="${p.position}"></span>
                  </div>
                  <div class="stat-item">
                    <span class="stat-item__label">Ranking</span>
                    <span class="stat-item__value" th:text="${'#' + p.ranking}"></span>
                  </div>
                  <div class="stat-item">
                    <span class="stat-item__label">Nacionalidade</span>
                    <span class="stat-item__value" th:text="${p.nationality}"></span>
                  </div>
                  <div class="stat-item">
                    <span class="stat-item__label">Pontuação</span>
                    <span class="stat-item__value" th:text="${p.score}"></span>
                  </div>
                </div>

                <div class="player-card__desc" th:text="${p.description}"></div>
                <div class="player-card__hint">Passe o mouse para voltar</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
