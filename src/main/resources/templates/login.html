<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Leafs Nation Shop</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav('login')}"></div>

    <main class="container">
      <header class="page-head">
        <h1>Entrar na sua Conta</h1>
        <p class="muted">Você precisa estar logado para acessar a loja.</p>
      </header>

      <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div th:if="${errorMsg}" style="color: red; margin-bottom: 12px; font-weight: bold;" th:text="${errorMsg}"></div>
        <div th:if="${successMsg}" style="color: green; margin-bottom: 12px; font-weight: bold;" th:text="${successMsg}"></div>

        <form th:action="@{/login}" method="post" style="display: flex; flex-direction: column; gap: 14px;">
          <label style="display: flex; flex-direction: column; gap: 4px;">
            <span style="font-weight: 600;">Usuário</span>
            <input type="text" name="username" required style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem;" />
          </label>
          <label style="display: flex; flex-direction: column; gap: 4px;">
            <span style="font-weight: 600;">Senha</span>
            <input type="password" name="password" required style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem;" />
          </label>
          <button type="submit" style="padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">
            Acessar a Loja
          </button>
        </form>

        <p style="margin-top: 20px; text-align: center;">
          Ainda não tem conta? <a th:href="@{/register}" style="color: var(--blue); font-weight: bold;">Cadastre-se aqui</a>.
        </p>
      </div>
    </main>
  </body>
</html>
