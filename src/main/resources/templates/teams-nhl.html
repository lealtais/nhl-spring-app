<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Times da NHL</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script defer th:src="@{/js/app.js}"></script>
    <style>
      .team-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }
      .team-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        text-align: center;
        box-shadow: var(--shadow);
        transition: transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 180px;
        text-decoration: none;
        color: inherit;
      }
      .team-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
        border-color: var(--blue);
      }
      .team-card__logo {
        max-width: 90px;
        max-height: 90px;
        margin-bottom: 15px;
        object-fit: contain;
      }
      .team-card__name {
        font-weight: 700;
        font-size: 0.95rem;
        line-height: 1.2;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav('nhl')}"></div>

    <main class="container">
      <header class="page-head" style="text-align: center; margin-top: 40px;">
        <h1>Álbum de Figurinhas da NHL</h1>
        <p class="muted">
          Escolha um time para ver as figurinhas oficiais da temporada com dados atualizados ao vivo.
        </p>
      </header>

      <section class="team-grid" aria-label="Times da NHL">
        <a 
          th:each="team : ${teams}" 
          th:href="@{/jogadores/nhl/{abbrev}(abbrev=${team.abbreviation})}"
          class="team-card"
        >
          <img class="team-card__logo" th:src="${team.logoUrl}" th:alt="${team.name + ' Logo'}" />
          <div class="team-card__name" th:text="${team.name}"></div>
        </a>
      </section>
    </main>
  </body>
</html>
