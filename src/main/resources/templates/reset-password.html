<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Criar Nova Senha - Leafs Nation Shop</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
    <div th:replace="~{fragments/nav :: nav('login')}"></div>
    <main class="container">
      <header class="page-head">
        <h1>Nova Senha</h1>
        <p class="muted">Digite uma senha segura para sua conta.</p>
      </header>

      <div class="card" style="max-width: 400px; margin: 0 auto;">
          <form th:action="@{/reset-password}" method="post" style="display: flex; flex-direction: column; gap: 14px;">
              <input type="hidden" name="token" th:value="${token}" />
              <label style="display: flex; flex-direction: column; gap: 4px;">
                  <span style="font-weight: 600;">Sua Nova Senha</span>
                  <input type="password" name="password" required placeholder="Digite a nova senha" style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; color: #333;" />
              </label>
              <button type="submit" style="padding: 12px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">
                  Salvar Nova Senha
              </button>
          </form>
      </div>
    </main>
</body>
</html>
