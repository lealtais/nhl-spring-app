<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post salvo</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
  <div th:replace="~{fragments/nav :: nav('posts')}"></div>

  <main class="container">
    <section>
      <h1>Post salvo com sucesso!</h1>
      <p>O post "<span th:text="${post.titulo}"></span>" foi registrado.</p>
      <a th:href="@{/posts}">Ver lista de posts</a>
      <a th:href="@{/posts/new}">Cadastrar outra ideia</a>
    </section>
  </main>
</body>
</html>
