<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro - Leafs Nation Shop</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav('register')}"></div>

    <main class="container">
      <header class="page-head">
        <h1>Criar uma Conta</h1>
        <p class="muted">Cadastre-se para ter acesso exclusivo aos produtos da Leafs Nation.</p>
      </header>

      <div class="card" style="max-width: 400px; margin: 0 auto;">
        <div th:if="${errorMsg}" style="color: red; margin-bottom: 12px; font-weight: bold;" th:text="${errorMsg}"></div>

        <form th:action="@{/register}" method="post" style="display: flex; flex-direction: column; gap: 14px;">
          <label style="display: flex; flex-direction: column; gap: 4px;">
            <span style="font-weight: 600;">Escolha um Usuário</span>
            <input type="text" name="username" required style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem;" />
          </label>
          <label style="display: flex; flex-direction: column; gap: 4px;">
            <span style="font-weight: 600;">Crie uma Senha</span>
            <input type="password" name="password" required style="padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem;" />
          </label>
          <button type="submit" style="padding: 12px; background: #16a34a; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">
            Finalizar Cadastro
          </button>
        </form>

        <p style="margin-top: 20px; text-align: center;">
          Já possui conta? <a th:href="@{/login}" style="color: var(--blue); font-weight: bold;">Faça login aqui</a>.
        </p>
      </div>
    </main>
  </body>
</html>
